<a class="project__link" href="{{ project.url | relative_url }}">
  <div class="project" style="background-color: {{ project.theme_color | default: '#ccc' }}">

    <div class="descriptions">
      {% if project.tags %}
        <ul class="project__tag">
          {% for tag in project.tags %}
            <li class="project__tag">{{ tag }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <div class="project__content">
        <h3 class="project__title">{{ project.title }}</h3>
        <p class="project__client">{{ project.client }}</p>
      </div>
    </div>

    {% if project.hero and project.hero.image %}
      <img src="{{ project.hero.image | relative_url }}" alt="{{ project.title }}" class="project__image">
    {% endif %}

  </div>
</a>

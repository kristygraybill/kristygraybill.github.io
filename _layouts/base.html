<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  {% include base-components/head.html %}
  <script src="{{ '/assets/js/scroll-reveal.js' | relative_url }}"></script>
</head>

<body class="page page--{{ page.layout | default: 'default' }}">
  <!--
  HEY! Funny running into you here! I suppose you're the curious type,
  but hope you provide grace to a life-long learner as you look around.

  I hand-coded much of this site with the assistance of web resources,
  A.I., and the Jekyll framework. This is not my personal strength,
  but was a stretch goal. 
  
  So please forgive the absence of best-practices and technical debt
  I accrued during discovery.
-->
{% include base-components/head.html %}
  {% include navigation.html %}

  <main id="content" class="site-content">
    {{ content }}
  </main>

  {% include base-components/footer.html %}

  {% if page.custom_js %}
    <script src="{{ page.custom_js | relative_url }}"></script>
  {% endif %}
</body>
</html>
